function resizeCanvas() {
  const scaleX = window.innerWidth / BASE_W;
  const scaleY = window.innerHeight / BASE_H;
  const scale = Math.min(scaleX, scaleY);
  canvas.style.width = (BASE_W * scale) + 'px';
  canvas.style.height = (BASE_H * scale) + 'px';
}

window.addEventListener('resize', resizeCanvas);

// ============================================================
// Input Manager
// ============================================================
class InputManager {
  constructor() {
    this.keys = {};
    this.prevKeys = {};
    window.addEventListener('keydown', e => {
      e.preventDefault();
      this.keys[e.code] = true;
    });
    window.addEventListener('keyup', e => {
      e.preventDefault();
      this.keys[e.code] = false;
    });
  }
  isDown(code) { return !!this.keys[code]; }
  justPressed(code) { return !!this.keys[code] && !this.prevKeys[code]; }
  update() { this.prevKeys = { ...this.keys }; }
}

// ============================================================
// Particle System
// ============================================================
class Particle {
  constructor(x, y, vx, vy, color, life, size) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = life; this.maxLife = life;
    this.size = size || 4;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.1;
    this.life--;
  }
  draw(ctx) {
    const alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size * alpha, this.size * alpha);
    ctx.globalAlpha = 1;
  }
}

const particles = [];
const MAX_PARTICLES = 200;

function addParticle(p) {
  if (particles.length < MAX_PARTICLES) particles.push(p);
}
function spawnHitParticles(x, y, count, color) {
  count = Math.min(count, 15); // Cap per-spawn
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    addParticle(new Particle(
      x, y, Math.cos(angle) * speed, Math.sin(angle) * speed,
      color, 15 + Math.random() * 15, 3 + Math.random() * 5
    ));
  }
}
function spawnExplosion(x, y) {
  const colors = ['#ff4400', '#ffaa00', '#ffff00', '#ffffff'];
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 8;
    addParticle(new Particle(
      x, y, Math.cos(angle) * speed, Math.sin(angle) * speed,
      colors[Math.floor(Math.random() * colors.length)], 20 + Math.random() * 20, 4 + Math.random() * 8
    ));
  }
}

// ============================================================
// Screen Shake
// ============================================================
let shakeX = 0, shakeY = 0, shakeMagnitude = 0, shakeDuration = 0;
function triggerShake(mag, dur) { shakeMagnitude = mag; shakeDuration = dur; }
function updateShake() {
  if (shakeDuration > 0) {
    shakeX = (Math.random() - 0.5) * shakeMagnitude * 2;
    shakeY = (Math.random() - 0.5) * shakeMagnitude * 2;
    shakeDuration--;
    shakeMagnitude *= 0.9;
  } else { shakeX = 0; shakeY = 0; }
}

// ============================================================
// Sound System (Web Audio API) - with node cleanup
// ============================================================
let audioCtx;
let activeSounds = 0;
const MAX_SOUNDS = 16; // Prevent audio node leak
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(freq, type, duration, volume) {
  ensureAudio();
  if (activeSounds >= MAX_SOUNDS) return; // Skip if too many active
  activeSounds++;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.1;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
  // Clean up nodes after they finish
  osc.onended = () => {
    osc.disconnect();
    gain.disconnect();
    activeSounds--;
  };
}
function playHitSound(strength) {
  const vol = 0.05 + strength * 0.1;
  playSound(200 + strength * 100, 'sawtooth', 0.1, Math.min(vol, 0.3));
}
function playKOSound() {
  playSound(600, 'square', 0.1, 0.2);
  playSound(300, 'square', 0.3, 0.15);
}

// ============================================================
// Projectile
// ============================================================
class Projectile {
  constructor(x, y, vx, vy, owner, attackData) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.owner = owner; this.data = attackData;
    this.w = 16; this.h = 12; this.life = 60; this.hit = false;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
  }
  draw(ctx) {
    ctx.fillStyle = this.owner.charData.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }
  getHitbox() {
    return { x: this.x - 10, y: this.y - 10, w: 20, h: 20 };
  }
}

const ITEM_TYPES = {
  beamSword: { name: 'ビームソード', color: '#00ffff', effect: 'sword', duration: 600 },
  heart: { name: 'ハートの器', color: '#ff69b4', effect: 'heal' },
  bobOmb: { name: 'ボム兵', color: '#333333', effect: 'bomb' },
  fan: { name: 'ハリセン', color: '#ffdd00', effect: 'fan', duration: 450 }
};

class Item {
  constructor(x, y, type) {
    this.x = x; this.y = y; this.type = type;
    this.vy = 0; this.grounded = false; this.life = 600;
    this.w = 20; this.h = 20; this.bobPhase = Math.random() * Math.PI * 2;
  }
  update(platforms) {
    if (!this.grounded) {
      this.vy += GRAVITY * 0.5;
      this.y += this.vy;
      for (const p of platforms) {
        if (this.y + 10 >= p.y && this.y + 10 <= p.y + 10 && this.x >= p.x && this.x <= p.x + p.w && this.vy > 0) {
          this.y = p.y - 10;
          this.vy = 0;
          this.grounded = true;
        }
      }
    }
    this.bobPhase += 0.05;
    this.life--;
  }
  draw(ctx) {
    const bob = this.grounded ? Math.sin(this.bobPhase) * 3 : 0;
    const itemData = Object.values(ITEM_TYPES).find(t => t === this.type);
    ctx.fillStyle = this.type.color;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(this.x, this.y + bob, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = '8px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(this.type.name.charAt(0), this.x, this.y + bob + 3);
  }
}
